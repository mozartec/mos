<article class="prose max-w-none">
  <!-- The container is a non-interactive delegation host (links live inside it),
       so it intentionally stays non-focusable; keyboard activation is delegated
       via (keydown). Only interactive-supports-focus needs suppressing. -->
  <!-- eslint-disable-next-line @angular-eslint/template/interactive-supports-focus -->
  <div #container (click)="onContainerClick($event)" (keydown)="onContainerKeydown($event)"></div>
</article>
