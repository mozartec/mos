<section aria-labelledby="reader-heading" class="flex flex-col gap-3 p-4">
  <div>
    <a class="btn btn-ghost btn-sm" [routerLink]="backLink()" [queryParams]="backQueryParams()">
      <span aria-hidden="true">←</span> Back to {{ backLabel() }}
    </a>
  </div>

  @switch (loadState()) {
    @case ('loading') {
      <p class="text-base-content/60">Loading…</p>
    }
    @case ('error') {
      <p class="text-error">Failed to load the vault: {{ loadError() }}</p>
    }
    @default {
      <h2 id="reader-heading" class="font-mono text-sm text-base-content/70">{{ path() }}</h2>

      @if (bodyError()) {
        <p role="alert" class="text-error">{{ bodyError() }}</p>
      } @else {
        <section class="rounded-box bg-base-100 p-4 shadow-sm">
          <app-markdown-reader
            [body]="body()"
            [model]="model()"
            [config]="config()"
            (navigate)="onNavigate($event)"
          />
        </section>
      }
    }
  }
</section>
