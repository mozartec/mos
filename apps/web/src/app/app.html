<div class="min-h-dvh bg-base-200 text-base-content">
  <header class="navbar bg-base-100 shadow-sm">
    <div class="navbar-start gap-2">
      <span class="text-lg font-semibold">Markdown on Steroids</span>
      <span class="badge badge-ghost badge-sm">{{ cardCount() }} cards</span>
    </div>
    <div class="navbar-end gap-2">
      <div class="join" role="group" aria-label="Choose view">
        <button
          type="button"
          class="btn join-item"
          [class.btn-active]="view() === 'wiki'"
          [attr.aria-pressed]="view() === 'wiki'"
          (click)="select('wiki')"
        >
          Wiki
        </button>
        <button
          type="button"
          class="btn join-item"
          [class.btn-active]="view() === 'board'"
          [attr.aria-pressed]="view() === 'board'"
          (click)="select('board')"
        >
          Board
        </button>
      </div>

      <button
        type="button"
        class="btn btn-circle btn-ghost"
        (click)="toggleTheme()"
        [attr.aria-pressed]="isDark()"
        [attr.aria-label]="isDark() ? 'Switch to light theme' : 'Switch to dark theme'"
      >
        @if (isDark()) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
            />
          </svg>
        } @else {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"
            />
          </svg>
        }
      </button>
    </div>
  </header>

  <main class="p-4">
    @if (view() === 'wiki') {
      <app-wiki-view />
    } @else {
      <app-board-view />
    }
  </main>
</div>
