<div class="min-h-dvh bg-base-200 text-base-content">
  <header class="navbar bg-base-100 shadow-sm">
    <div class="navbar-start gap-2">
      <span class="text-lg font-semibold">Markdown on Steroids</span>
      <span class="badge badge-ghost badge-sm">{{ cardCount() }} cards</span>
    </div>
    <div class="navbar-end gap-2">
      <div class="join" role="group" aria-label="Choose view">
        <button
          type="button"
          class="btn join-item"
          [class.btn-active]="view() === 'wiki'"
          [attr.aria-pressed]="view() === 'wiki'"
          (click)="select('wiki')"
        >
          Wiki
        </button>
        <button
          type="button"
          class="btn join-item"
          [class.btn-active]="view() === 'board'"
          [attr.aria-pressed]="view() === 'board'"
          (click)="select('board')"
        >
          Board
        </button>
      </div>

      <button
        type="button"
        class="btn btn-circle btn-ghost"
        (click)="toggleTheme()"
        [attr.aria-pressed]="isDark()"
        [attr.aria-label]="isDark() ? 'Switch to light theme' : 'Switch to dark theme'"
      >
        @if (isDark()) {
          <app-icon [icon]="iconSun" [size]="20" />
        } @else {
          <app-icon [icon]="iconMoon" [size]="20" />
        }
      </button>
    </div>
  </header>

  <main class="p-4">
    @if (view() === 'wiki') {
      <app-wiki-view />
    } @else {
      <app-board-view />
    }
  </main>
</div>
