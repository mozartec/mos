<div class="min-h-dvh bg-base-100 text-base-content">
  <header class="navbar border-b border-base-300 bg-base-100">
    <div class="navbar-start gap-2">
      @if (vaultName(); as name) {
        <span class="text-lg font-semibold">{{ name }}</span>
      } @else {
        <span class="h-6 w-44 skeleton" aria-hidden="true"></span>
      }
    </div>
    <div class="navbar-end gap-3">
      <nav class="tabs-box tabs" aria-label="Choose view">
        <a
          class="tab"
          routerLink="/wiki"
          routerLinkActive="tab-active"
          ariaCurrentWhenActive="page"
        >
          Wiki
        </a>
        <a
          class="tab"
          routerLink="/board"
          routerLinkActive="tab-active"
          ariaCurrentWhenActive="page"
        >
          Board
        </a>
        <a
          class="tab"
          routerLink="/graph"
          routerLinkActive="tab-active"
          ariaCurrentWhenActive="page"
        >
          Graph
        </a>
      </nav>

      <span class="font-mono text-sm font-medium tracking-wider text-base-content/50">mos</span>
      <button
        type="button"
        class="btn btn-circle btn-ghost"
        (click)="toggleTheme()"
        [attr.aria-pressed]="isDark()"
        [attr.aria-label]="isDark() ? 'Switch to light theme' : 'Switch to dark theme'"
      >
        @if (isDark()) {
          <app-icon [icon]="iconSun" [size]="20" />
        } @else {
          <app-icon [icon]="iconMoon" [size]="20" />
        }
      </button>
    </div>
  </header>

  <main class="p-4">
    <router-outlet />
  </main>
</div>
