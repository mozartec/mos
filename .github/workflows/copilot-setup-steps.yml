name: Copilot Setup Steps

# Pre-provisions the GitHub Copilot coding agent's environment so it starts with the
# repo's toolchain (Bun + Node) already installed — instead of bootstrapping it past the
# agent firewall, which wastes turns and bloats context. Mirrors ci.yml's setup.
#
# Requirements (GitHub docs): the job MUST be named `copilot-setup-steps`, and this file
# must exist on the default branch to take effect. Only `steps`, `permissions`, `runs-on`,
# `services`, `snapshot`, and `timeout-minutes` (max 59) are customizable.
#
# Model selection is NOT pinned here (this file only provisions the toolchain). The cloud
# agent's model is chosen per task in the GitHub UI — the issue-assignee dropdown, the
# `@copilot` PR comment, or the Agents panel/Mobile/Raycast — otherwise it defaults to the
# repo's Settings > Copilot > Cloud agent default. Left unset, "auto" has been resolving to
# gpt-5.3-codex. Options include GPT-5.4, Claude Sonnet 4.6, Gemini 2.5 Pro. To compare
# models for ship jobs, pick the model when you start the task. Docs:
# https://docs.github.com/en/copilot/how-tos/use-copilot-agents/coding-agent/changing-the-ai-model

on:
  workflow_dispatch:
  # Smoke-test that provisioning still installs cleanly whenever this file changes.
  # Not a required gate — the Copilot agent reads this file from the default branch to
  # set up its own environment; that path never touches CI. Scope push to main so a PR
  # gets one run (pull_request, pre-merge), not a duplicate push+PR run on the same commit.
  push:
    branches: [main]
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_OPTIONS: "--disable-warning=DEP0205"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: "26"

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile
