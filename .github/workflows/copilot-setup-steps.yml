name: Copilot Setup Steps

# Pre-provisions the GitHub Copilot coding agent's environment so it starts with the
# repo's toolchain (Bun + Node) already installed — instead of bootstrapping it past the
# agent firewall, which wastes turns and bloats context. Mirrors ci.yml's setup.
#
# Requirements (GitHub docs): the job MUST be named `copilot-setup-steps`, and this file
# must exist on the default branch to take effect. Only `steps`, `permissions`, `runs-on`,
# `services`, `snapshot`, and `timeout-minutes` (max 59) are customizable.

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_OPTIONS: "--disable-warning=DEP0205"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: "26"

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile
