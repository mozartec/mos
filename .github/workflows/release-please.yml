# Release automation (T-010, ADR-015): release-please maintains a release PR
# from Conventional Commit squash titles; merging it tags vX.Y.Z and creates
# the GitHub Release. The publish job runs in this same workflow — gated on a
# release actually being cut — because tags pushed with the workflow's
# GITHUB_TOKEN do not trigger other workflows.
name: Release

on:
  push:
    branches: [main]

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release

  publish:
    name: Publish @mozartec/mos-cli
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # npm trusted publishing: per-run OIDC exchange, no stored token (ADR-015).
      id-token: write
    env:
      NODE_OPTIONS: '--disable-warning=DEP0205'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and smoke test the packed CLI
        run: bunx turbo run smoke --filter=@mozartec/mos-cli

      - name: Publish to npm
        working-directory: apps/cli
        run: npm publish
